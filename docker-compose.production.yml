# docker-compose.production.yml — Production HayaFlash
# Usage : docker compose -f docker-compose.production.yml up -d
# Ne jamais utiliser en développement (pas de volume bind-mount src)

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.prod
  ENVIRONMENT: prod

x-django-base: &django-base
  image: "${DOCKER_IMAGE:-hayaflash}:${IMAGE_TAG:-latest}"
  env_file: /srv/hayaflash/.env
  environment:
    <<: *django-env
  volumes:
    - media_data:/app/media
    - static_data:/app/staticfiles
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

services:
  # ── Base de données ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    env_file: /srv/hayaflash/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hayaflash}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cache / Broker ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ── Django Web (Gunicorn) ─────────────────────────────────────────────────────
  web:
    <<: *django-base
    command: >
      gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 3
        --worker-class gthread
        --threads 2
        --timeout 60
        --max-requests 1000
        --max-requests-jitter 100
        --access-logfile -
        --error-logfile -
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx (reverse proxy + static) ───────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: always

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    <<: *django-base
    command: celery -A config worker -l info -c 4 -Q default,flash_sales,notifications
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 15s
      retries: 3

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  beat:
    <<: *django-base
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
