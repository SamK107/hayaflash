# infra/nginx/prod.conf — Reverse proxy HayaFlash (production)

# ── Rate limiting zones ────────────────────────────────────────────────────────
# Zone générale : 30 req/s par IP
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
# Zone API orders : 10 req/s par IP (protection anti-flood commandes)
limit_req_zone $binary_remote_addr zone=api_orders:10m rate=10r/s;
# Zone login/OTP : 5 req/min par IP
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Upstream Gunicorn ──────────────────────────────────────────────────────────
upstream django {
    server web:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS principal ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${PROD_DOMAIN};

    # Certificat Let's Encrypt (Certbot)
    ssl_certificate     /etc/letsencrypt/live/${PROD_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PROD_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Sécurité HTTP headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;
    keepalive_timeout 65;

    # ── Fichiers statiques (WhiteNoise via Django, ou direct Nginx) ─────────────
    location /static/ {
        alias /srv/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    location /media/ {
        alias /srv/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── API orders : rate limit strict ─────────────────────────────────────────
    location /api/v1/orders/ {
        limit_req zone=api_orders burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── Endpoints auth : rate limit anti-brute-force ────────────────────────────
    location ~ ^/(login|otp)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── Tout le reste ─────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=60 nodelay;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
    }

    # ── Health check interne (pas de rate limit, pas de log) ──────────────────
    location = /health/ {
        access_log off;
        proxy_pass http://django;
        proxy_set_header Host $host;
    }
}
