# Nginx config — HayaFlash production
# Placé dans /etc/nginx/sites-available/hayaflash
# Lien symbolique : ln -s /etc/nginx/sites-available/hayaflash /etc/nginx/sites-enabled/

upstream django {
    server web:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hayaflash.ml www.hayaflash.ml;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hayaflash.ml www.hayaflash.ml;

    # Certificats SSL (Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/hayaflash.ml/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hayaflash.ml/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hayaflash.ml/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS — 1 an (à activer APRÈS que le site HTTPS fonctionne)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=()" always;

    # Client max body (photos produits : 5 Mo)
    client_max_body_size 6M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Fichiers statiques (WhiteNoise gère les en-têtes Cache-Control)
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Médias (photos produits)
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Healthcheck (pas de log)
    location /health/ {
        proxy_pass http://django;
        access_log off;
    }

    # Application Django
    location / {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Désactiver le buffering pour HTMX / SSE
        proxy_buffering off;
    }
}
