name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

env:
  DJANGO_SETTINGS_MODULE: config.settings.test
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  test:
    name: Tests Django
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérification Django
        run: python manage.py check --settings=config.settings.test

      - name: Migrations à jour ? (aucune migration manquante)
        run: python manage.py makemigrations --check --dry-run --settings=config.settings.test

      - name: Tests + couverture
        run: |
          pip install pytest-django pytest-cov
          pytest \
            --ds=config.settings.test \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . --select E,F,W --ignore E501
