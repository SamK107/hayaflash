{% if delivery_rows %}
<div class="space-y-3">
  {% for row in delivery_rows %}
    {% include "delivery/partials/delivery_row.html" with row=row only %}
  {% endfor %}
</div>
{% else %}
<div class="bg-white rounded-2xl border border-gray-100 p-8 text-center">
  <i data-lucide="inbox" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
  <p class="text-gray-400 text-sm">Aucune livraison pour ce filtre.</p>
</div>
{% endif %}
